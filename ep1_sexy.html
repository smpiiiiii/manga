<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みなみ先生 第1話（セクシー版）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { background: #111; color: #fff; font-family: sans-serif; padding: 12px }
h2 { font-size: 15px; text-align: center; margin: 10px 0 }
h3 { font-size: 12px; text-align: center; color: #f8a; margin-bottom: 12px }
.panel { margin-bottom: 12px; position: relative }
.panel img { width: 100%; border-radius: 8px; border: 2px solid #333 }
.panel .num { position: absolute; top: 8px; left: 8px; background: #ff0033; color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900 }
.panel .caption { background: rgba(0,0,0,.7); color: #fff; padding: 8px 12px; border-radius: 0 0 8px 8px; font-size: 13px; margin-top: -6px; line-height: 1.5 }
.panel .caption .name { color: #f8a; font-weight: 700 }
</style>
</head>
<body>
<h2>🩺💕 ゆるふわ研修医みなみ</h2>
<h3>第1話「はじめまして、みなみです」</h3>

<div class="panel">
    <div class="num">1</div>
    <img src="ep1s_p1.png">
    <div class="caption"><span class="name">みなみ：</span>今日からここで…研修医、がんばります…<br>（風が気持ちいい…桜きれい🌸）</div>
</div>

<div class="panel">
    <div class="num">2</div>
    <img src="ep1s_p2.png">
    <div class="caption"><span class="name">みなみ：</span>あっ…カルテが…！<br>（初日から何やってるの私…💦）</div>
</div>

<div class="panel">
    <div class="num">3</div>
    <img src="ep1s_p3.png">
    <div class="caption"><span class="name">先輩：</span>…はい、聴診器。落としてたよ。<br><span class="name">みなみ：</span>あ…ありがとうございます…！（近い…！！💓）</div>
</div>

<div class="panel">
    <div class="num">4</div>
    <img src="ep1s_p4.png">
    <div class="caption"><span class="name">みなみ：</span>…なんだか、この病院…悪くないかも。<br>（明日もあの先輩に会えるかな…✨）</div>
</div>
</body>
</html>
