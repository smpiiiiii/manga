<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みなみ先生 第1話（ちびキャラ版）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box }
body { background: #fffaf0; color: #333; font-family: sans-serif; padding: 12px }
h2 { font-size: 15px; text-align: center; margin: 10px 0; color: #f06 }
h3 { font-size: 12px; text-align: center; color: #f9a; margin-bottom: 12px }
.panel { margin-bottom: 12px; position: relative }
.panel img { width: 100%; border-radius: 12px; border: 3px solid #fcc }
.panel .num { position: absolute; top: 8px; left: 8px; background: #f06; color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900 }
.panel .caption { background: #fff0f5; color: #555; padding: 8px 12px; border-radius: 0 0 12px 12px; font-size: 13px; margin-top: -6px; line-height: 1.5; border: 2px solid #fcc; border-top: none }
.panel .caption .name { color: #f06; font-weight: 700 }
</style>
</head>
<body>
<h2>🩺🎀 ゆるふわ研修医みなみ</h2>
<h3>第1話「はじめまして、みなみです」ちびキャラ版</h3>

<div class="panel">
    <div class="num">1</div>
    <img src="ep1c_p1.png">
    <div class="caption"><span class="name">みなみ：</span>きょうからけんしゅうい！がんばるぞ〜✨</div>
</div>

<div class="panel">
    <div class="num">2</div>
    <img src="ep1c_p2.png">
    <div class="caption"><span class="name">みなみ：</span>ちょ…聴診器がぁぁ！！ぐるぐる〜💫</div>
</div>

<div class="panel">
    <div class="num">3</div>
    <img src="ep1c_p3.png">
    <div class="caption"><span class="name">先輩：</span>…大丈夫？<br><span class="name">みなみ：</span>（こ、この人こわい…でもかっこいい…💕）</div>
</div>

<div class="panel">
    <div class="num">4</div>
    <img src="ep1c_p4.png">
    <div class="caption"><span class="name">みなみ：</span>すぅ…zzZ<br>（白衣おふとんにして寝落ち👼）</div>
</div>
</body>
</html>
