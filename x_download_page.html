<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゆるふわ女医みなみ - X投稿用</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box }
        body { font-family: 'Zen Maru Gothic', sans-serif; background: linear-gradient(135deg, #fff5f5, #ffe8f0, #fdf0ff); min-height: 100vh; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 16px }
        h1 { color: #e84393; font-size: 16px; text-align: center }
        .hint { color: #999; font-size: 11px; text-align: center; max-width: 320px }
        .ep { width: 320px; max-width: 100%; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 3px 15px rgba(232,67,147,.12); border: 2px solid #f0c0d8 }
        .ep h3 { padding: 8px 12px; font-size: 13px; color: #e84393; background: linear-gradient(135deg,#fff0f5,#ffe0ec); border-bottom: 1px solid #f0d0e0 }
        .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 4px }
        .panels a { display: block; border-radius: 8px; overflow: hidden; position: relative }
        .panels a img { width: 100%; display: block }
        .panels a .dl { position: absolute; bottom: 4px; right: 4px; background: rgba(232,67,147,.85); color: #fff; font-size: 9px; padding: 2px 8px; border-radius: 8px; font-weight: 700 }
        .nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center }
        .nav a { color: #e84393; font-size: 11px; text-decoration: none; border: 1px solid #f0c0d8; padding: 4px 10px; border-radius: 12px; background: #fff }
    </style>
</head>
<body>
    <h1>🩺 ゆるふわ女医みなみ<br>X投稿用ダウンロード</h1>
    <p class="hint">各コマを個別にダウンロードしてXに4枚添付で投稿！📱</p>

    <div class="ep">
        <h3>第1話 はじめまして、みなみです♡</h3>
        <div class="panels">
            <a href="/dl/ep1-1"><img src="/dl/ep1-1"><span class="dl">①📥</span></a>
            <a href="/dl/ep1-2"><img src="/dl/ep1-2"><span class="dl">②📥</span></a>
            <a href="/dl/ep1-3"><img src="/dl/ep1-3"><span class="dl">③📥</span></a>
            <a href="/dl/ep1-4"><img src="/dl/ep1-4"><span class="dl">④📥</span></a>
        </div>
    </div>

    <div class="nav">
        <a href="/profile">📷 プロフセット</a>
    </div>
</body>
</html>
