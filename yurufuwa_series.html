<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゆるふわ女医みなみ｜エピソード一覧</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box }
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe8f0 50%, #fdf0ff 100%);
            min-height: 100vh; padding: 20px 12px;
        }
        .header {
            text-align: center; margin-bottom: 24px;
        }
        .header h1 {
            font-size: 24px; color: #e84393; font-weight: 900;
            margin-bottom: 4px;
        }
        .header p { font-size: 13px; color: #999; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px; max-width: 900px; margin: 0 auto;
        }
        .ep-card {
            background: #fff; border-radius: 14px; overflow: hidden;
            box-shadow: 0 3px 15px rgba(232,67,147,.12);
            border: 2px solid #f0c0d8;
            text-decoration: none; color: inherit;
            transition: transform .2s, box-shadow .2s;
            display: block;
        }
        .ep-card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(232,67,147,.2); }
        .ep-card iframe {
            width: 100%; height: 340px; border: none;
            pointer-events: none;
        }
        .ep-info {
            padding: 10px 14px;
            background: linear-gradient(135deg, #fff0f5, #ffe0ec);
            border-top: 1px solid #f0d0e0;
        }
        .ep-info .ep-num {
            font-size: 11px; color: #fff;
            background: linear-gradient(135deg, #e84393, #fd79a8);
            padding: 2px 10px; border-radius: 10px; font-weight: 700;
            display: inline-block; margin-bottom: 4px;
        }
        .ep-info .ep-title { font-size: 14px; color: #e84393; font-weight: 900; }
        .footer {
            text-align: center; margin-top: 24px; padding: 16px;
            font-size: 12px; color: #bbb;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💗 ゆるふわ女医みなみ</h1>
        <p>茶髪ポニテの女医みなみ先生のドタバタ日常4コマ</p>
    </div>
    <div class="grid" id="ep-grid"></div>
    <div class="footer">
        💗 ゆるふわ女医みなみ ｜ AI生成4コマ漫画
    </div>
    <script>
    /**
     * ★ 投稿済みエピソードだけここに追加 ★
     * 投稿したら番号を追加するだけ！
     * 例: [1, 2, 3] → 第1話〜第3話だけ表示
     * 番外編は 'happen' を追加
     */
    const POSTED_EPISODES = [];

    // 全エピソード情報
    const ALL_EPISODES = [
        { ep: 1, label: '第1話', title: '距離感バグってる外来', file: 'yurufuwa_ep1.html' },
        { ep: 2, label: '第2話', title: '当直中のカップ麺の背徳感', file: 'yurufuwa_ep2.html' },
        { ep: 3, label: '第3話', title: '健康診断でまさかの…💦', file: 'yurufuwa_ep3.html' },
        { ep: 4, label: '第4話', title: '夜勤明けのシャワー事件💦', file: 'yurufuwa_ep4.html' },
        { ep: 5, label: '第5話', title: '病院忘年会のドレス事件👗', file: 'yurufuwa_ep5.html' },
        { ep: 6, label: '第6話', title: '朝のコーヒー大惨事☕💦', file: 'yurufuwa_ep6.html' },
        { ep: 7, label: '第7話', title: '患者さんに告白された!?💌', file: 'yurufuwa_ep7.html' },
        { ep: 8, label: '第8話', title: '雨の日のスケスケ白衣事件☔💦', file: 'yurufuwa_ep8.html' },
        { ep: 9, label: '第9話', title: '当直室の置き手紙💌', file: 'yurufuwa_ep9.html' },
        { ep: 10, label: '第10話', title: '当直コール地獄📱💀', file: 'yurufuwa_ep10.html' },
        { ep: 11, label: '第11話', title: '指導医のヤバい距離感💍', file: 'yurufuwa_ep11.html' },
        { ep: 12, label: '第12話', title: 'スマホの通知📱💔', file: 'yurufuwa_ep12.html' },
        { ep: 13, label: '第13話', title: '合コンの問診タイム🍷💊', file: 'yurufuwa_ep13.html' },
        { ep: 14, label: '第14話', title: '初めてのお泊り🏠💕', file: 'yurufuwa_ep14.html' },
        { ep: 'happen', label: '番外編', title: 'ハプニング編', file: 'yurufuwa_happen.html' },
    ];

    // 投稿済みだけフィルタして表示
    const grid = document.getElementById('ep-grid');
    const toShow = POSTED_EPISODES.length > 0
        ? ALL_EPISODES.filter(e => POSTED_EPISODES.includes(e.ep))
        : ALL_EPISODES; // 空の場合は全部表示（初期テスト用）

    toShow.forEach(ep => {
        const card = document.createElement('a');
        card.className = 'ep-card';
        card.href = ep.file;
        card.innerHTML = `
            <iframe src="${ep.file}" scrolling="no"></iframe>
            <div class="ep-info">
                <span class="ep-num">${ep.label}</span>
                <div class="ep-title">${ep.title}</div>
            </div>
        `;
        grid.appendChild(card);
    });
    </script>
</body>
</html>
