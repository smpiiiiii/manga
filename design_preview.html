<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新キャラデザイン確認</title>
    <style>
        body {
            font-family: sans-serif;
            background: #fff5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            gap: 12px
        }

        h1 {
            font-size: 18px;
            color: #d63384
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            max-width: 500px;
            width: 100%
        }

        .grid img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #f0c0d0
        }

        p {
            font-size: 13px;
            color: #555;
            max-width: 500px;
            text-align: center
        }

        .label {
            font-size: 11px;
            color: #d63384;
            font-weight: bold;
            text-align: center
        }
    </style>
</head>

<body>
    <h1>💊 新キャラデザイン案「カプセルナースさくら」</h1>
    <p>ちいかわ風→薬カプセル型のオリジナルキャラにリデザイン！<br>
        ほっぺの絆創膏、ハート十字のナースキャップ、キラキラ大きな目</p>
    <div class="grid">
        <div>
            <div class="label">① 指示簿確認</div>
            <img src="o1a.png">
        </div>
        <div>
            <div class="label">② シリンジ混乱</div>
            <img src="o1b.png">
        </div>
        <div>
            <div class="label">③ 先輩がストップ</div>
            <img src="o1c.png">
        </div>
        <div>
            <div class="label">④ 反省＆慰め</div>
            <img src="o1d.png">
        </div>
    </div>
    <p>👆 このデザインでOKなら全11話作り直します！</p>
</body>

</html>
